<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YISリマインダー</title>
<style>
*{box-sizing:border-box;font-family:sans-serif}
body{max-width:375px;margin:auto;background:#f4f7fb;padding-bottom:80px}
header{background:#4A90E2;color:#fff;text-align:center;padding:14px;font-size:22px;font-weight:bold}
.screen{display:none;padding:12px}.active{display:block}
.card,.task{background:#fff;border-radius:12px;padding:10px;margin-top:10px}
input,select,button{width:100%;padding:10px;margin-top:8px}
.calendar-head{display:flex;gap:6px;align-items:center}
.calendar-head span{flex:1;text-align:center;font-weight:bold}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.day{background:#fff;border-radius:8px;padding:8px;min-height:45px;text-align:center;cursor:pointer;position:relative}
.has-task{background:#4A90E2;color:#fff}
.dot{position:absolute;bottom:3px;right:4px;font-size:10px}
nav{position:fixed;bottom:0;max-width:375px;width:100%;display:flex}
nav button{flex:1}
.pie{width:220px;height:220px;border-radius:50%;margin:20px auto}
.delete{background:#e74c3c;color:white}
</style>
</head>
<body>
<header>YISリマインダー</header>

<div id="calendarScreen" class="screen active">
<div class="calendar-head">
<button onclick="changeMonth(-1)">◀</button>
<span id="monthTitle"></span>
<button onclick="changeMonth(1)">▶</button>
</div>
<input type="month" id="jumpMonth">
<div id="calendar" class="calendar"></div>
<div id="selectedDayTasks" class="card">日付を選択してください</div>
<button onclick="showScreen('registerScreen')">＋ 課題登録</button>
</div>

<div id="registerScreen" class="screen">
<input id="taskName" placeholder="課題・テスト名">
<select id="taskType">
<option>課題</option>
<option>テスト</option>
</select>
<input type="date" id="taskDate">
<select id="notice">
<option>1日前</option>
<option>3日前</option>
<option>7日前</option>
<option>通知なし</option>
</select>
<button onclick="addTask()">登録</button>
<div id="taskList"></div>
</div>

<div id="chartScreen" class="screen">
<div id="pie" class="pie"></div>

<label>勉強 <span id="sv">30%</span></label>
<input type="range" id="study" min="0" max="100" value="30">

<label>部活 <span id="cv">25%</span></label>
<input type="range" id="club" min="0" max="100" value="25">

<label>自由時間 <span id="fv">25%</span></label>
<input type="range" id="free" min="0" max="100" value="25">

<label>睡眠 <span id="slv">20%</span></label>
<input type="range" id="sleep" min="0" max="100" value="20">
</div>

<nav>
<button onclick="showScreen('calendarScreen')">📅</button>
<button onclick="showScreen('registerScreen')">📝</button>
<button onclick="showScreen('chartScreen')">📊</button>
</nav>

<script>
let currentDate=new Date();
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function changeMonth(n){currentDate.setMonth(currentDate.getMonth()+n);renderCalendar();}

function renderCalendar(){
calendar.innerHTML="";
const y=currentDate.getFullYear();
const m=currentDate.getMonth();
monthTitle.textContent=`${y}年${m+1}月`;
const days=new Date(y,m+1,0).getDate();

for(let i=1;i<=days;i++){
const dateStr=`${y}-${String(m+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
const d=document.createElement("div");
d.className="day";
const count=tasks.filter(t=>t.date===dateStr).length;
if(count)d.classList.add("has-task");
d.innerHTML=i+(count?`<div class="dot">${count}</div>`:"");
d.onclick=()=>showDayTasks(dateStr);
calendar.appendChild(d);
}
}

function showDayTasks(date){
const list=tasks.filter(t=>t.date===date);
if(!list.length){
selectedDayTasks.innerHTML=`<h3>${date}</h3><p>予定なし</p>`;
return;
}
selectedDayTasks.innerHTML=`<h3>${date}</h3>`+list.map(t=>
`<div class="task">${t.type==="テスト"?"📝":"📘"} ${t.name}</div>`
).join("");
}

function addTask(){
const t={
name:taskName.value,
type:taskType.value,
date:taskDate.value,
notice:notice.value
};
if(!t.name||!t.date){alert("入力してください");return;}
tasks.push(t);
localStorage.setItem("tasks",JSON.stringify(tasks));
taskName.value="";
renderTaskList();
renderCalendar();
}

function renderTaskList(){
taskList.innerHTML="";
tasks.forEach((t,i)=>{
taskList.innerHTML+=`
<div class="task">
${t.type==="テスト"?"📝":"📘"} <b>${t.name}</b><br>
${t.date} / ${t.notice}
<button class="delete" onclick="delTask(${i})">削除</button>
</div>`;
});
}

function delTask(i){
tasks.splice(i,1);
localStorage.setItem("tasks",JSON.stringify(tasks));
renderTaskList();
renderCalendar();
}

function updatePie(){
const a=+study.value,b=+club.value,c=+free.value,d=+sleep.value;
sv.textContent=a+"%"; cv.textContent=b+"%"; fv.textContent=c+"%"; slv.textContent=d+"%";
const total=a+b+c+d||1;
const p1=a/total*100,p2=(a+b)/total*100,p3=(a+b+c)/total*100;
pie.style.background=`conic-gradient(#4A90E2 0 ${p1}%,#5CCB5F ${p1}% ${p2}%,#FFD93D ${p2}% ${p3}%,#FF6B6B ${p3}% 100%)`;
localStorage.setItem("chartData",JSON.stringify({a,b,c,d}));
}

["study","club","free","sleep"].forEach(id=>{
document.getElementById(id).addEventListener("input",updatePie);
});

jumpMonth.addEventListener("change",e=>{
const [y,m]=e.target.value.split("-");
currentDate=new Date(y,m-1);
renderCalendar();
});

const saved=JSON.parse(localStorage.getItem("chartData"));
if(saved){
study.value=saved.a;club.value=saved.b;free.value=saved.c;sleep.value=saved.d;
}

renderCalendar();
renderTaskList();
updatePie();
</script>
</body>
</html>
